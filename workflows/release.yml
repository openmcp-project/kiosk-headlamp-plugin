name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: |
          tar -czf headlamp-kiosk.tar.gz \
            -C dist main.js \
            package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: headlamp-kiosk.tar.gz
          generate_release_notes: true
